
name: ML Pipeline

on:
  push:
    branches: main
jobs:
  validate:
    runs-on: ubunto-latest
  steps:
      - name: checkout 
        uses: actions/checkout@v4
      - name: python setup
        uses: actions/setup-python@v4 
      - name: install dependencies
        run: pip install -r requirements.txt
        if: success() && contains(github.event.head.commit_messaage.["run-model"])
        run: train-model.py
        if: success()
        run: model.py
      - name: upload artifacts
        uses: actions/upload-artifacts@v4
        with:
          name: model
          path: model.py
      - name: failure
        if: failure()
        uses: actions/fail-logs@v4
        with:
          name: failed logs for debugging
          path: failed-logs.txt
      - name: success
        if : always()
        run: completetion-status.txt
  deploy:
    runs-on: ubunto-latest
    needs: validate
    steps:
    - name: checkout 
      uses: actions/checkout@v4
    - name: python setup
      uses: actions/setup-python@v4 
    - name: install dependencies
      run: pip install -r requirements.txt
    - name: download artifacts
      uses: actions/download-artifacts@v4
    - name: success
      if : always()
      run: completetion-status.txt








          
